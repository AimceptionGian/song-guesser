name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    name: Lint & TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            workers/package-lock.json

      # Frontend
      - name: Install frontend deps
        run: npm ci
      - name: TypeScript check (frontend)
        run: npx tsc --noEmit

      # Backend
      - name: Install backend deps
        working-directory: workers
        run: npm ci
      - name: TypeScript check (backend)
        working-directory: workers
        run: npx tsc --noEmit

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            workers/package-lock.json

      - name: Install frontend deps
        run: npm ci
      - name: Install backend deps
        working-directory: workers
        run: npm ci

      - name: Run backend tests
        working-directory: workers
        run: npm test

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci
      - name: Build
        run: npm run build